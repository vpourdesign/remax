<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats Ville</title>
  <style>
    :root {
      --bg-0: #e9eff8;
      --bg-1: #d7e2f2;
      --ink-0: #0f1f34;
      --ink-1: #2e4768;
      --glass: rgba(255, 255, 255, 0.56);
      --stroke: rgba(255, 255, 255, 0.72);
      --brand: #5e7dad;
      --brand-2: #7f9fc8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink-0);
      background:
        radial-gradient(circle at 16% 20%, rgba(126, 156, 196, 0.34), transparent 38%),
        radial-gradient(circle at 82% 80%, rgba(95, 127, 174, 0.22), transparent 42%),
        linear-gradient(140deg, var(--bg-0), var(--bg-1));
      padding: 28px;
    }

    .wrap {
      max-width: 1140px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--stroke);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 22px 50px rgba(24, 43, 74, 0.2);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 13px;
      font-weight: 650;
      color: var(--ink-1);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select,
    input[type="file"] {
      height: 48px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.74);
      background: rgba(255,255,255,0.7);
      padding: 0 12px;
      color: #17304f;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      height: 52px;
      border: 1px solid rgba(255,255,255,0.62);
      border-radius: 14px;
      background: linear-gradient(145deg, var(--brand-2), var(--brand));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--ink-1);
      line-height: 1.4;
    }

    .preview {
      min-height: 260px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      border: 1px dashed rgba(96, 126, 166, 0.54);
      background: rgba(255,255,255,0.36);
      overflow: hidden;
    }

    .preview img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(21, 41, 67, 0.22);
    }

    .download {
      margin-top: 12px;
      display: inline-flex;
      padding: 12px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 650;
      color: #fff;
      background: linear-gradient(145deg, #6f8db8, #5d78a4);
      border: 1px solid rgba(255,255,255,0.42);
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>Stats ville</h1>

      <label class="field">
        <span class="label">Pour quelle ville</span>
        <select id="citySelect">
          <option value="blainville">Blainville</option>
        </select>
      </label>

      <label class="field">
        <span class="label">Photo du courtier</span>
        <input id="photoInput" type="file" accept="image/*" />
      </label>

      <button id="createBtn" class="btn" type="button">Créer</button>
      <p class="hint">Sortie: image portrait 1080 x 1350, photo à gauche, logo RE/MAX Crystal en dessous, ville + statistiques à droite.</p>
    </section>

    <section class="panel">
      <div id="preview" class="preview">Aperçu de l'image générée</div>
      <a id="downloadBtn" class="download hidden" download="stats-ville.png">Télécharger l'image</a>
    </section>
  </main>

    const STATS = {
      blainville: {
        title: "Blainville",
        period: "Février 2026",
        values: [
          { label: "Nouvelles inscriptions", value: "116" },
          { label: "Ventes", value: "75" },
          { label: "Propriétés en vigueur", value: "313" },
        ],
      },
    };

    const citySelect = document.getElementById("citySelect");
    const photoInput = document.getElementById("photoInput");
    const createBtn = document.getElementById("createBtn");
    const preview = document.getElementById("preview");
    const downloadBtn = document.getElementById("downloadBtn");

    let photoDataUrl = null;

    photoInput.addEventListener("change", () => {
      const file = photoInput.files && photoInput.files[0];
      if (!file) {
        photoDataUrl = null;
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        photoDataUrl = String(reader.result || "");
      };
      reader.readAsDataURL(file);
    });

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawRoundedRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    async function generateImage() {
      const cityKey = citySelect.value;
      const city = STATS[cityKey];

      if (!city) {
        alert("Ville non trouvée.");
        return;
      }

      if (!photoDataUrl) {
        alert("Ajoute une photo du courtier avant de créer.");
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1350;
      const ctx = canvas.getContext("2d");

      const photo = await loadImage(photoDataUrl);
      let logo = null;
      try {
        logo = await loadImage(LOGO_DATA_URL);
      } catch (_) {
        logo = null;
      }

      const grad = ctx.createLinearGradient(0, 0, 1080, 1350);
      grad.addColorStop(0, "#edf2fa");
      grad.addColorStop(1, "#d8e4f4");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1080, 1350);

      ctx.fillStyle = "rgba(255,255,255,0.66)";
      drawRoundedRect(ctx, 34, 34, 1012, 1282, 34);
      ctx.fill();

      const leftX = 66;
      const leftW = 500;
      const photoY = 110;
      const photoH = 760;

      ctx.save();
      drawRoundedRect(ctx, leftX, photoY, leftW, photoH, 30);
      ctx.clip();

      const photoRatio = photo.width / photo.height;
      const boxRatio = leftW / photoH;
      let dw = leftW;
      let dh = photoH;
      let dx = leftX;
      let dy = photoY;

      if (photoRatio > boxRatio) {
        dh = photoH;
        dw = dh * photoRatio;
        dx = leftX - (dw - leftW) / 2;
      } else {
        dw = leftW;
        dh = dw / photoRatio;
        dy = photoY - (dh - photoH) / 2;
      }

      ctx.drawImage(photo, dx, dy, dw, dh);
      ctx.restore();

      ctx.fillStyle = "rgba(20,43,71,0.08)";
      drawRoundedRect(ctx, leftX, photoY + photoH + 22, leftW, 260, 24);
      ctx.fill();

      if (logo) {
        const logoMaxW = leftW - 56;
        const logoMaxH = 140;
        const logoRatio = logo.width / logo.height;
        let logoW = logoMaxW;
        let logoH = logoW / logoRatio;
        if (logoH > logoMaxH) {
          logoH = logoMaxH;
          logoW = logoH * logoRatio;
        }

        ctx.drawImage(
          logo,
          leftX + (leftW - logoW) / 2,
          photoY + photoH + 84,
          logoW,
          logoH
        );
      } else {
        ctx.fillStyle = "#1b365a";
        ctx.font = "700 36px 'SF Pro Display', sans-serif";
        ctx.fillText("RE/MAX Crystal", leftX + 58, photoY + photoH + 145);
      }

      const rightX = 610;
      ctx.fillStyle = "#10253f";
      ctx.font = "800 70px 'SF Pro Display', sans-serif";
      ctx.fillText(city.title.toUpperCase(), rightX, 178);

      ctx.fillStyle = "#3a5476";
      ctx.font = "600 30px 'SF Pro Display', sans-serif";
      ctx.fillText(city.period, rightX, 226);

      let cardY = 292;
      for (const item of city.values) {
        ctx.fillStyle = "rgba(255,255,255,0.82)";
        drawRoundedRect(ctx, rightX, cardY, 398, 244, 24);
        ctx.fill();

        ctx.fillStyle = "#3f5d83";
        ctx.font = "650 26px 'SF Pro Display', sans-serif";
        ctx.fillText(item.label, rightX + 24, cardY + 64);

        ctx.fillStyle = "#10253f";
        ctx.font = "800 114px 'SF Pro Display', sans-serif";
        ctx.fillText(item.value, rightX + 24, cardY + 186);

        cardY += 272;
      }

      return canvas;
    }

    createBtn.addEventListener("click", async () => {
      try {
        createBtn.disabled = true;
        createBtn.textContent = "Création...";

        const canvas = await generateImage();
        const dataUrl = canvas.toDataURL("image/png");

        preview.innerHTML = "";
        const img = document.createElement("img");
        img.src = dataUrl;
        img.alt = "Aperçu stats ville";
        preview.appendChild(img);

        downloadBtn.href = dataUrl;
        downloadBtn.classList.remove("hidden");
      } catch (err) {
        alert("Erreur de génération: " + (err.message || String(err)));
      } finally {
        createBtn.disabled = false;
        createBtn.textContent = "Créer";
      }
    });
  </script>
