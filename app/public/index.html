<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RE/MAX AI Builder</title>
  <style>
    :root {
      --bg-0: #e8eef7;
      --bg-1: #d8e3f3;
      --ink-0: #05080f;
      --ink-1: #233247;
      --ink-2: #4d637f;
      --glass-fill: rgba(255, 255, 255, 0.44);
      --glass-stroke: rgba(255, 255, 255, 0.62);
      --frost-shadow: 0 22px 64px rgba(24, 43, 74, 0.26);
      --brand-ice: #7f9fc8;
      --brand-ice-strong: #5f7fae;
      --brand-deep: #1a273a;
      --shell-height: 68vh;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink-0);
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(155deg, rgba(231, 238, 248, 0.38), rgba(210, 224, 243, 0.3)),
        url('/bg.jpg') center center / cover no-repeat fixed;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(2px);
    }

    body::before {
      inset: 0;
      width: auto;
      height: auto;
      top: 0;
      right: 0;
      border-radius: 0;
      background: linear-gradient(140deg, rgba(238, 245, 255, 0.34), rgba(31, 47, 68, 0.26));
      backdrop-filter: saturate(120%);
      -webkit-backdrop-filter: saturate(120%);
    }

    body::after {
      width: 300px;
      height: 300px;
      bottom: -110px;
      left: -90px;
      background: radial-gradient(circle, rgba(114, 146, 190, 0.3), rgba(114, 146, 190, 0));
    }

    .app {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .chat-shell {
      width: 100%;
      max-width: 1100px;
      height: var(--shell-height);
      background: linear-gradient(145deg, var(--glass-fill), rgba(255, 255, 255, 0.26));
      border: 1px solid var(--glass-stroke);
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--frost-shadow);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      transform-origin: center bottom;
      transform: translateY(120px) scale(0.012);
      opacity: 0;
      transition:
        height 1260ms cubic-bezier(0.2, 0.9, 0.22, 1.08),
        transform 1680ms cubic-bezier(0.18, 0.9, 0.24, 1.12),
        opacity 960ms ease,
        box-shadow 1080ms ease;
      will-change: height, transform, opacity;
    }

    body.is-ready .chat-shell {
      transform: translateY(0) scale(1);
      opacity: 1;
      box-shadow: 0 30px 90px rgba(24, 43, 74, 0.34);
      animation: shellBubbleIn 2460ms cubic-bezier(0.16, 0.98, 0.24, 1.02);
    }

    .chat-header {
      padding: 24px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.5);
      background:
        linear-gradient(150deg, rgba(255,255,255,0.62), rgba(255,255,255,0.26)),
        radial-gradient(circle at 0% 50%, rgba(120, 155, 199, 0.22), transparent 45%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 50px;
    }

    .brand-logo {
      width: 270px;
      height: 44px;
      background-image: url('/logo.png');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: left center;
      flex: 0 0 auto;
      filter: drop-shadow(0 5px 10px rgba(22, 39, 64, 0.2));
    }

    .brand-line {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #000;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background:
        radial-gradient(circle at top left, rgba(125, 156, 197, 0.2), transparent 34%),
        radial-gradient(circle at bottom right, rgba(95, 127, 174, 0.14), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.16) 100%);
      transition: padding 280ms ease;
    }

    .msg {
      max-width: 76%;
      padding: 16px 18px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 16px;
      white-space: pre-wrap;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transform-origin: bottom left;
      animation: messageBloom 520ms cubic-bezier(0.16, 0.98, 0.24, 1.18);
    }

    .msg.bot {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.68);
      color: #15253b;
      align-self: flex-start;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
    }

    .msg.user {
      background: linear-gradient(145deg, var(--brand-ice), var(--brand-ice-strong));
      color: #f9fbff;
      align-self: flex-end;
      border: 1px solid rgba(255,255,255,0.42);
      box-shadow: 0 10px 24px rgba(75, 103, 142, 0.34);
      transform-origin: bottom right;
    }

    .msg::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent 42%);
      opacity: 0.55;
      pointer-events: none;
    }

    .msg {
      position: relative;
    }

    .composer {
      border-top: 1px solid rgba(255,255,255,0.5);
      padding: 18px 20px 20px;
      background: linear-gradient(160deg, rgba(255,255,255,0.54), rgba(255,255,255,0.3));
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .text-input {
      flex: 1;
      height: 56px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.64);
      color: #112238;
      padding: 0 18px;
      font-size: 16px;
      outline: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .text-input::placeholder {
      color: #6a7f9d;
    }

    .text-input:focus {
      border-color: rgba(124, 158, 202, 0.9);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 0 0 4px rgba(115, 151, 197, 0.18);
    }

    .btn {
      height: 56px;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 16px;
      padding: 0 22px;
      font-size: 15px;
      font-weight: 650;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(69, 96, 132, 0.22);
    }

    .btn.primary {
      background: linear-gradient(145deg, #8fa9cb, #6f8db8);
      color: white;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.5);
      color: var(--brand-deep);
      border: 1px solid rgba(255,255,255,0.68);
    }

    .hidden {
      display: none !important;
    }

    .upload-box {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .color-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.48);
      border: 1px solid rgba(255,255,255,0.62);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .color-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .color-label {
      font-size: 13px;
      font-weight: 640;
      color: #2b4160;
      letter-spacing: 0.01em;
    }

    .color-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-swatch {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.68);
      background: transparent;
      padding: 0;
      cursor: pointer;
      overflow: hidden;
    }

    .color-swatch::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-swatch::-webkit-color-swatch {
      border: none;
      border-radius: 10px;
    }

    .hex-input {
      flex: 1;
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.68);
      color: #183150;
      padding: 0 12px;
      font-size: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      text-transform: uppercase;
      outline: none;
    }

    .color-save {
      margin-top: 12px;
    }

    .file-input {
      color: #304968;
      font-size: 14px;
    }

    .final-actions {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .month-stats {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.48);
      border: 1px solid rgba(255,255,255,0.62);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .month-stats-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }

    .month-stats-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #1b2f4a;
      letter-spacing: -0.01em;
    }

    .month-stats-period {
      font-size: 12px;
      font-weight: 640;
      color: #4d637f;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .month-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card {
      border-radius: 14px;
      padding: 12px;
      background: linear-gradient(160deg, rgba(255,255,255,0.76), rgba(255,255,255,0.42));
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 650;
      color: #375374;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #112238;
      font-weight: 760;
    }

    .site-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: white;
      background: linear-gradient(145deg, #6f8db8, #5d78a4);
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 650;
      border: 1px solid rgba(255,255,255,0.46);
      box-shadow: 0 10px 24px rgba(72, 99, 139, 0.22);
    }

    .messages::-webkit-scrollbar {
      width: 10px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(91, 121, 162, 0.42);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    @keyframes messageBloom {
      0% {
        opacity: 0;
        transform: translateY(32px) scale(0.86) skewY(2deg);
        filter: blur(14px);
      }
      62% {
        opacity: 1;
        transform: translateY(-6px) scale(1.03) skewY(-0.4deg);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes shellBubbleIn {
      0% {
        opacity: 0;
        transform: translateY(150px) scale(0.012);
        border-radius: 999px;
        filter: blur(12px);
      }
      18% {
        opacity: 1;
        transform: translateY(112px) scale(0.02);
        border-radius: 999px;
        filter: blur(8px);
      }
      52% {
        opacity: 1;
        transform: translateY(18px) scale(1.03);
        border-radius: 40px;
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        border-radius: 28px;
        filter: blur(0);
      }
    }

    @media (max-width: 768px) {
      .app { padding: 0; }
      .chat-shell {
        height: 100vh;
        border-radius: 0;
        border: none;
      }
      .brand {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .brand-logo {
        width: 220px;
        height: 36px;
      }
      .brand {
        gap: 24px;
      }
      .brand-line {
        font-size: 24px;
      }
      .color-grid {
        grid-template-columns: 1fr;
      }
      .month-stats-grid {
        grid-template-columns: 1fr;
      }
      .msg { max-width: 92%; }
      .row { flex-direction: column; align-items: stretch; }
      .btn, .text-input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="chat-shell">
      <div class="chat-header">
        <div class="brand">
          <div class="brand-logo" aria-hidden="true"></div>
          <p class="brand-line">Bâtissez votre site web</p>
        </div>
      </div>

      <div id="messages" class="messages"></div>

      <div class="composer">
        <div class="row">
          <input id="textInput" class="text-input" placeholder="Écrivez votre réponse ici..." />
          <button id="sendBtn" class="btn primary">Envoyer</button>
        </div>

        <div id="uploadBox" class="upload-box hidden">
          <input id="fileInput" class="file-input" type="file" multiple />
          <button id="uploadBtn" class="btn secondary">Téléverser</button>
        </div>

        <div id="colorBox" class="color-box hidden">
          <div class="color-grid">
            <label class="color-field" for="primaryColor">
              <span class="color-label">Couleur primaire</span>
              <div class="color-input-row">
                <input id="primaryColor" class="color-swatch" type="color" value="#D71920" />
                <input id="primaryHex" class="hex-input" value="#D71920" maxlength="7" spellcheck="false" />
              </div>
            </label>
            <label class="color-field" for="secondaryColor">
              <span class="color-label">Couleur secondaire</span>
              <div class="color-input-row">
                <input id="secondaryColor" class="color-swatch" type="color" value="#1C1C1C" />
                <input id="secondaryHex" class="hex-input" value="#1C1C1C" maxlength="7" spellcheck="false" />
              </div>
            </label>
          </div>
          <button id="saveColorsBtn" class="btn primary color-save">Confirmer les couleurs</button>
        </div>

        <div id="finalActions" class="final-actions hidden">
          <button id="generateBtn" class="btn primary">Générer le site</button>
          <a id="viewSiteBtn" class="site-link hidden" target="_blank">Voir le site</a>
        </div>

        <section class="month-stats" aria-label="Statistiques du mois">
          <div class="month-stats-header">
            <h3 class="month-stats-title">Statistiques du mois</h3>
            <span class="month-stats-period">Blainville - Fevrier 2026</span>
          </div>
          <div class="month-stats-grid">
            <article class="stat-card">
              <div class="stat-label">Nouvelles inscriptions</div>
              <p class="stat-value">116</p>
            </article>
            <article class="stat-card">
              <div class="stat-label">Ventes</div>
              <p class="stat-value">75</p>
            </article>
            <article class="stat-card">
              <div class="stat-label">Proprietes en vigueur</div>
              <p class="stat-value">313</p>
            </article>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const chatShell = document.querySelector(".chat-shell");
    const textInput = document.getElementById("textInput");
    const sendBtn = document.getElementById("sendBtn");
    const uploadBox = document.getElementById("uploadBox");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const colorBox = document.getElementById("colorBox");
    const primaryColor = document.getElementById("primaryColor");
    const secondaryColor = document.getElementById("secondaryColor");
    const primaryHex = document.getElementById("primaryHex");
    const secondaryHex = document.getElementById("secondaryHex");
    const saveColorsBtn = document.getElementById("saveColorsBtn");
    const finalActions = document.getElementById("finalActions");
    const generateBtn = document.getElementById("generateBtn");
    const viewSiteBtn = document.getElementById("viewSiteBtn");
    const backgrounds = ["/bg.jpg", "/bg2.jpg", "/bg3.jpg", "/bg4.jpg"];
    let currentBackground = "";

    const state = {
      step: 0,
      brokerId: null,
      profile: null
    };

    const steps = [
      "Bonjour, quel est votre nom de courtier ou votre nom d’équipe ?",
      "Quels territoire ou territoires desservez-vous ? (séparez-les par des virgules)",
      "Décrivez votre service. Le plus vous en dites, le mieux votre site sera.",
      "Téléchargez votre logo.",
      "Téléchargez vos photos.",
      "Choisissez la couleur primaire et la couleur secondaire de votre site."
    ];

    function updateShellSize() {
      const messageCount = messages.children.length;
      const vh = Math.min(92, 68 + messageCount * 4.2);
      chatShell.style.height = `${vh}vh`;
    }

    function addMessage(role, text) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      messages.appendChild(el);
      updateShellSize();
      messages.scrollTop = messages.scrollHeight;
    }

    function setRandomBackground() {
      const candidates = backgrounds.filter((bg) => bg !== currentBackground);
      const next = candidates[Math.floor(Math.random() * candidates.length)];

      currentBackground = next;
      document.body.style.background = `
        linear-gradient(155deg, rgba(231, 238, 248, 0.38), rgba(210, 224, 243, 0.3)),
        url('${next}') center center / cover no-repeat fixed
      `;
    }

    function askCurrentStep() {
      addMessage("bot", steps[state.step]);

      if (state.step === 3 || state.step === 4) {
        uploadBox.classList.remove("hidden");
        colorBox.classList.add("hidden");
        textInput.classList.add("hidden");
        sendBtn.classList.add("hidden");
        fileInput.multiple = state.step === 4;
      } else if (state.step === 5) {
        uploadBox.classList.add("hidden");
        colorBox.classList.remove("hidden");
        textInput.classList.add("hidden");
        sendBtn.classList.add("hidden");
        const palette = state.profile?.palette || {};
        const primary = normalizeHex(palette.primary || primaryColor.value, "#D71920");
        const secondary = normalizeHex(palette.secondary || secondaryColor.value, "#1C1C1C");
        primaryColor.value = primary;
        secondaryColor.value = secondary;
        primaryHex.value = primary;
        secondaryHex.value = secondary;
      } else {
        uploadBox.classList.add("hidden");
        colorBox.classList.add("hidden");
        textInput.classList.remove("hidden");
        sendBtn.classList.remove("hidden");
        textInput.focus();
      }
    }

    function normalizeHex(value, fallback) {
      const v = String(value || "").trim().toUpperCase();
      if (/^#[0-9A-F]{6}$/.test(v)) return v;
      return fallback;
    }

    async function createBroker(name) {
      const res = await fetch("/api/create-broker", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      });

      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || "Erreur création broker");
      }

      state.brokerId = data.brokerId;
      state.profile = data.profile;
    }

    async function updateProfile() {
      const res = await fetch(`/api/profile/update/${state.brokerId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(state.profile)
      });

      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || "Erreur update profile");
      }
    }

    async function handleTextStep() {
      const value = textInput.value.trim();
      if (!value) return;

      addMessage("user", value);
      textInput.value = "";

      try {
        if (state.step === 0) {
          await createBroker(value);
          state.profile.name = value;
        } else if (state.step === 1) {
          state.profile.territories = value
            .split(",")
            .map(s => s.trim())
            .filter(Boolean);
          await updateProfile();
        } else if (state.step === 2) {
          state.profile.bio = value;
          await updateProfile();
        }

        state.step++;

        if (state.step < steps.length) {
          askCurrentStep();
        } else {
          finishFlow();
        }
      } catch (err) {
        addMessage("bot", "Erreur : " + err.message);
      }
    }

    async function handleUploadStep() {
      if (!fileInput.files.length) return;

      try {
        const formData = new FormData();
        const kind = state.step === 3 ? "logo" : "photo";

        formData.append("brokerId", state.brokerId);
        formData.append("kind", kind);

        for (const file of fileInput.files) {
          formData.append("files", file);
        }

        const res = await fetch("/api/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.error || "Erreur upload");
        }

        state.profile = data.profile;

        addMessage("user", kind === "logo" ? "Logo téléversé." : "Photos téléversées.");

        fileInput.value = "";
        state.step++;

        if (state.step < steps.length) {
          askCurrentStep();
        } else {
          finishFlow();
        }
      } catch (err) {
        addMessage("bot", "Erreur : " + err.message);
      }
    }

    async function handleColorStep() {
      try {
        const primary = normalizeHex(primaryHex.value || primaryColor.value, "#D71920");
        const secondary = normalizeHex(secondaryHex.value || secondaryColor.value, "#1C1C1C");

        primaryColor.value = primary;
        secondaryColor.value = secondary;
        primaryHex.value = primary;
        secondaryHex.value = secondary;

        state.profile.palette = {
          ...(state.profile.palette || {}),
          primary,
          secondary
        };

        await updateProfile();
        addMessage("user", `Couleurs choisies: primaire ${primary}, secondaire ${secondary}.`);

        state.step++;
        if (state.step < steps.length) {
          askCurrentStep();
        } else {
          finishFlow();
        }
      } catch (err) {
        addMessage("bot", "Erreur : " + err.message);
      }
    }

    function finishFlow() {
      uploadBox.classList.add("hidden");
      colorBox.classList.add("hidden");
      textInput.classList.add("hidden");
      sendBtn.classList.add("hidden");

      addMessage("bot", "Parfait. Toutes les étapes sont complétées. Vous pouvez maintenant générer votre site.");
      finalActions.classList.remove("hidden");
    }

    async function generateSite() {
      try {
        generateBtn.disabled = true;
        generateBtn.textContent = "Génération...";

        const res = await fetch(`/api/generate/${state.brokerId}`, {
          method: "POST"
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.error || "Erreur génération");
        }

        addMessage("bot", "Le site a été généré avec succès.");
        viewSiteBtn.href = data.preview;
        viewSiteBtn.classList.remove("hidden");
      } catch (err) {
        addMessage("bot", "Erreur : " + err.message);
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "Générer le site";
      }
    }

    sendBtn.addEventListener("click", handleTextStep);
    textInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleTextStep();
    });
    uploadBtn.addEventListener("click", handleUploadStep);
    saveColorsBtn.addEventListener("click", handleColorStep);
    primaryColor.addEventListener("input", () => {
      primaryHex.value = primaryColor.value.toUpperCase();
    });
    secondaryColor.addEventListener("input", () => {
      secondaryHex.value = secondaryColor.value.toUpperCase();
    });
    primaryHex.addEventListener("blur", () => {
      const normalized = normalizeHex(primaryHex.value, primaryColor.value.toUpperCase());
      primaryHex.value = normalized;
      primaryColor.value = normalized;
    });
    secondaryHex.addEventListener("blur", () => {
      const normalized = normalizeHex(secondaryHex.value, secondaryColor.value.toUpperCase());
      secondaryHex.value = normalized;
      secondaryColor.value = normalized;
    });
    generateBtn.addEventListener("click", generateSite);

    setRandomBackground();
    setInterval(setRandomBackground, 10000);
    requestAnimationFrame(() => {
      document.body.classList.add("is-ready");
      updateShellSize();
    });
    askCurrentStep();
  </script>
</body>
</html>
